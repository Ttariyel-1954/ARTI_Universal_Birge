# ═══════════════════════════════════════════════════════════════
# DOCKER COMPOSE — bütün xidmətləri bir əmrlə işə sal
# İstifadə: docker compose up -d
# Qeyd: Bu skelet konfiqurasiyadır, Dərs 6-da tam doldurulacaq
# ═══════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:17-alpine
    container_name: ttis_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ttis_db}
      POSTGRES_USER: ${DB_USER:-royatalibova}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas:/docker-entrypoint-initdb.d
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/docker/backend.Dockerfile
    container_name: ttis_backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DOMAIN: ${DOMAIN:-construction}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/frontend.Dockerfile
    container_name: ttis_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  shiny:
    build:
      context: ./dashboard
      dockerfile: ../deploy/docker/shiny.Dockerfile
    container_name: ttis_shiny
    ports:
      - "3838:3838"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
